<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Online Admission</title>

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<header class="page-header">

<h1>Chinmaya Vidyalaya Bokaro</h1>

<p>Online Admission Form</p>

</header>

<section class="admission-form">

<h2>Student Admission</h2>

<form>

<div class="form-grid">

<input type="text" placeholder="Student Name" required>

<input type="date" required>

<select required>

<option>Select Gender</option>

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

<input type="text" placeholder="Father's Name" required>

<input type="text" placeholder="Mother's Name" required>

<input type="tel" placeholder="Mobile Number" required>

<input type="email" placeholder="Email Address">

<input type="text" placeholder="Class Applying For">

<textarea placeholder="Full Address"></textarea>

<input type="file">

</div>

<button type="submit">Submit Application</button>

</form>

</section>

</body>
</html>
